<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JLPT 極簡測驗系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="progress-bg">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="header">
            <select id="level-select">
                <option value="ALL">全部級別</option>
                <option value="N5">僅 N5</option>
                <option value="N4">僅 N4</option>
            </select>
            <span id="score-display">0 / 0</span>
        </div>

        <h3 id="question-text">這個單字的意思是？</h3>
        <h2 id="japanese-word">載入中...</h2>

        <div id="options-container" class="options"></div>

        <div id="feedback-area" class="hidden">
            <p id="feedback-msg"></p>
            <button id="next-btn">下一題 ➔</button>
        </div>
    </div>

    <div id="ghost">👻</div>

    <script src="script.js"></script>
</body>
</html>
